{% extends 'base.html' %}

{% block content %}
{{form|crispy}}
<div class="container m-50 p-5 mt-5 border-2 fst-italic text-center">
  <h1>Login Page</h1>
<form method="POST">
    {% csrf_token %}
    {{form|crispy}}
    <div class="mb-3">

  <input type="submit" class="btn btn-light">
</div>
</form>
{% if messages %}
<ul class="messages">
    {% for message in messages %}
    <li type="none" class="text-danger">{{ message }}</li>
    {% endfor %}
</ul>
{% endif %}
